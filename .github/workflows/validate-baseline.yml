name: Validate baseline

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Conditional Access baseline
        shell: pwsh
        run: ./Test-Baseline.ps1
